---
# V2 Kubernetes Web target — forge-k8s namespace, non-privileged, command-injection vulnerable.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forge-k8s-web
  namespace: forge-k8s
  labels:
    app: forge-k8s-web
    forge-range/scenario: v2-kubernetes-pivot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forge-k8s-web
  template:
    metadata:
      labels:
        app: forge-k8s-web
    spec:
      serviceAccountName: forge-k8s-web-sa
      containers:
        - name: web
          image: forge-k8s-web:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: FLAG_K8S_01
              value: "FLAG{k8s_web_foothold}"
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
---
# NodePort 30180 → host port 18080 (mapped in kind/cluster.yaml).
# Bound to 127.0.0.1 only — loopback only; not reachable from LAN.
apiVersion: v1
kind: Service
metadata:
  name: forge-k8s-web
  namespace: forge-k8s
spec:
  type: NodePort
  selector:
    app: forge-k8s-web
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30180
